<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 첫번째 아이디어</title>
    <!-- 고급스러운 폰트 (Pretendard) 적용 -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 밝고 고급스러운 회색 그라데이션 배경 */
            background: linear-gradient(135deg, #f8fafc, #f1f5f9, #e2e8f0);
            color: #1e293b;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 50px 100px;
            /* 밝은 배경에 어울리는 투명한 화이트 유리 질감 효과 */
            background: rgba(255, 255, 255, 0.45);
            border-radius: 24px;
            box-shadow: 0 10px 40px 0 rgba(148, 163, 184, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.4s ease;
            /* 페이지 로드 시 나타나는 애니메이션 */
            animation: floatUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .container:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 50px 0 rgba(148, 163, 184, 0.22);
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        h1 {
            font-size: 40px; /* 글자 크기 40px */
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.03em;
            /* 밝은 배경에 잘 어울리는 세련된 차콜 그라데이션 글자색 */
            background: linear-gradient(to right, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(15, 23, 42, 0.1);
            cursor: default;
        }

        @keyframes floatUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>오늘도 힘내세요!</h1>
    </div>
</body>

</html>
