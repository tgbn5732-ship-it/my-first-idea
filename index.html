<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 첫번째 아이디어</title>
    <!-- 고급스러운 폰트 (Pretendard) 적용 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 파란색 테마에 어울리는 깊고 세련된 다크 블루 배경 */
            background: linear-gradient(135deg, #0b1120, #172554, #1e3a8a);
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 50px 100px;
            /* Glassmorphism (유리 질감) 효과 */
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            /* 페이지 로드 시 나타나는 애니메이션 */
            animation: floatUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .container:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 45px 0 rgba(0, 0, 0, 0.5);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 5.5rem; /* 글자 크기 더 크게 */
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.03em;
            /* 텍스트에 파란색 계열 그라데이션 효과 적용 */
            background: linear-gradient(to right, #60a5fa, #3b82f6, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 8px 25px rgba(59, 130, 246, 0.4);
            cursor: default;
        }

        @keyframes floatUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>내 첫번째 아이디어</h1>
    </div>
</body>
</html>
