<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 첫번째 아이디어</title>
    <!-- 고급스러운 폰트 (Pretendard) 적용 -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 밝고 고급스러운 회색 그라데이션 배경 */
            background: linear-gradient(135deg, #f8fafc, #f1f5f9, #e2e8f0);
            color: #1e293b;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 50px 100px;
            /* 밝은 배경에 어울리는 투명한 화이트 유리 질감 효과 */
            background: rgba(255, 255, 255, 0.45);
            border-radius: 24px;
            box-shadow: 0 10px 40px 0 rgba(148, 163, 184, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.4s ease;
            /* 페이지 로드 시 나타나는 애니메이션 */
            animation: floatUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .container:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 50px 0 rgba(148, 163, 184, 0.22);
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        h1 {
            font-size: 40px; /* 글자 크기 40px */
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.03em;
            /* 밝은 배경에 잘 어울리는 세련된 차콜 그라데이션 글자색 */
            background: linear-gradient(to right, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(15, 23, 42, 0.1);
            cursor: default;
        }

        .btn {
            margin-top: 24px;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            /* 눈에 잘 띄는 세련된 파란색 그라데이션 적용 */
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.25);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-family: inherit;
            outline: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(37, 99, 235, 0.35);
            background: linear-gradient(135deg, #2563eb, #1e40af);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px 0 rgba(37, 99, 235, 0.2);
        }

        @keyframes floatUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 id="sentence">오늘도 힘내세요!</h1>
        <button class="btn" id="next-btn">다음 문장 보기</button>
    </div>

    <script>
        const sentences = [
            "오늘도 힘내세요!",
            "오늘도 해냈어요!",
            "조금씩 나아지고 있어요.",
            "이대로 계속 가 봅시다."
        ];
        let currentIndex = 0;

        const sentenceElement = document.getElementById('sentence');
        const buttonElement = document.getElementById('next-btn');

        buttonElement.addEventListener('click', () => {
            // 다음 문장 인덱스 계산 (0 -> 1 -> 2 -> 3 -> 0)
            currentIndex = (currentIndex + 1) % sentences.length;

            // 부드럽게 작아지면서 사라지는 효과
            sentenceElement.style.opacity = '0';
            sentenceElement.style.transform = 'scale(0.95)';
            sentenceElement.style.transition = 'opacity 0.15s ease, transform 0.15s ease';

            // 효과가 끝난 시점에 글자를 바꾸고 다시 나타나게 함
            setTimeout(() => {
                sentenceElement.textContent = sentences[currentIndex];
                sentenceElement.style.opacity = '1';
                sentenceElement.style.transform = 'scale(1)';
            }, 150);
        });
    </script>
</body>

</html>
